name: Terraform CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to target'
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write       # required for OIDC authentication to Azure
  pull-requests: write  # required to post plan summary as PR comment

env:
  TF_VERSION: '1.9.8'
  TFLINT_VERSION: 'v0.53.0'
  TF_ROOT: 'infra/terraform'

jobs:
  # ---------------------------------------------------------------------------
  # Lint & security scan — runs on every PR and push
  # ---------------------------------------------------------------------------
  lint-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ env.TF_ROOT }}
        run: terraform fmt -check -recursive -diff
        continue-on-error: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Init TFLint plugins
        working-directory: ${{ env.TF_ROOT }}
        run: tflint --init

      - name: Run TFLint on modules
        working-directory: ${{ env.TF_ROOT }}
        run: |
          tflint --chdir modules/networking
          tflint --chdir modules/observability
          tflint --chdir modules/front_door
          tflint --chdir modules/container_registry
          tflint --chdir modules/key_vault
          tflint --chdir modules/storage
          tflint --chdir modules/cosmos_db
          tflint --chdir modules/service_bus
          tflint --chdir modules/container_apps
          tflint --chdir modules/web_pubsub

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_ROOT }}
          config_file: ${{ env.TF_ROOT }}/.checkov.yml
          framework: terraform
          output_format: cli
          output_file_path: console
          soft_fail: false

  # ---------------------------------------------------------------------------
  # Validate — runs on every PR and push, one job per environment
  # ---------------------------------------------------------------------------
  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: lint-and-scan

    strategy:
      matrix:
        environment: [dev, prod]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (no backend)
        working-directory: ${{ env.TF_ROOT }}/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_ROOT }}/environments/${{ matrix.environment }}
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Plan dev — runs on PRs (plan only, never apply)
  # ---------------------------------------------------------------------------
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest
    needs: validate
    environment: dev
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_DEV }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}/environments/dev
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_ROOT }}/environments/dev
        run: |
          terraform plan \
            -var-file="dev.tfvars" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -out=tfplan-dev \
            -detailed-exitcode
        continue-on-error: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.TF_ROOT }}/environments/dev/tfplan-dev
          retention-days: 7

      - name: Post Plan Summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan — dev 🔧
            Exit code: \`${{ steps.plan.outcome }}\`

            > Plan artifact uploaded as \`tfplan-dev\`. Download and review before applying.

            *Triggered by: @${{ github.actor }}, Workflow: \`${{ github.workflow }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Plan prod — runs on push to main (plan only) and workflow_dispatch
  # ---------------------------------------------------------------------------
  plan-prod:
    name: Plan (prod)
    runs-on: ubuntu-latest
    needs: validate
    environment: prod
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}/environments/prod
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_ROOT }}/environments/prod
        run: |
          terraform plan \
            -var-file="prod.tfvars" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -out=tfplan-prod \
            -detailed-exitcode
        continue-on-error: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_ROOT }}/environments/prod/tfplan-prod
          retention-days: 7

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Apply prod — triggered only via workflow_dispatch after manual review of plan
  # ---------------------------------------------------------------------------
  apply-prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: prod
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && github.event.inputs.environment == 'prod'

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PROD }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_ROOT }}/environments/prod
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_ROOT }}/environments/prod

      - name: Terraform Apply
        working-directory: ${{ env.TF_ROOT }}/environments/prod
        run: terraform apply -auto-approve tfplan-prod
