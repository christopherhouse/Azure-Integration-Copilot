# =============================================================================
# CI Workflow — Integrisight.ai  (reusable child workflow)
# =============================================================================
# Called by the parent cicd.yml workflow.
# Jobs: frontend build/test, backend build/test, Bicep lint/build, container
#        build/scan/push.
# =============================================================================

name: CI

on:
  workflow_call:

permissions:
  contents: read
  id-token: write          # OIDC auth to Azure
  packages: write          # Push to GHCR
  security-events: write   # Upload SARIF
  checks: write            # Publish test results
  pull-requests: write     # Test reporter PR annotations

# ---------------------------------------------------------------------------
# Job 1 — Frontend: build, lint, test
# ---------------------------------------------------------------------------
jobs:
  build-and-test-frontend:
    name: "Frontend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Lint
        working-directory: src/frontend
        run: npm run lint

      - name: Build
        working-directory: src/frontend
        run: npm run build

      - name: Run tests
        working-directory: src/frontend
        env:
          JEST_JUNIT_OUTPUT_DIR: ../../test-results
          JEST_JUNIT_OUTPUT_NAME: frontend-results.xml
        run: npm test -- --ci --reporters=default --reporters=jest-junit

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Tests
          path: test-results/frontend-results.xml
          reporter: jest-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Job 2 — Backend: build, lint, test
  # -------------------------------------------------------------------------
  build-and-test-backend:
    name: "Backend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: src/backend
        run: uv sync --frozen

      - name: Lint
        working-directory: src/backend
        run: uv run ruff check .

      - name: Run tests
        working-directory: src/backend
        run: uv run pytest --junitxml=../../test-results/backend-results.xml -v

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: test-results/backend-results.xml
          reporter: java-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Job 3 — Bicep: lint, build, publish artifacts
  # -------------------------------------------------------------------------
  bicep-build:
    name: "Bicep — Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Bicep templates
        working-directory: infra/bicep
        run: |
          echo "::group::Linting main.bicep"
          az bicep lint --file main.bicep
          echo "::endgroup::"

          echo "::group::Linting front-door-deploy.bicep"
          az bicep lint --file front-door-deploy.bicep
          echo "::endgroup::"

          for module in modules/*.bicep; do
            echo "::group::Linting ${module}"
            az bicep lint --file "${module}"
            echo "::endgroup::"
          done

      - name: Build Bicep to ARM JSON
        working-directory: infra/bicep
        run: |
          mkdir -p ../../bicep-compiled
          az bicep build --file main.bicep --outfile ../../bicep-compiled/main.json
          az bicep build --file front-door-deploy.bicep --outfile ../../bicep-compiled/front-door-deploy.json

      - name: Upload compiled Bicep artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bicep-compiled
          path: |
            bicep-compiled/main.json
            bicep-compiled/front-door-deploy.json
            infra/bicep/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Job 4 — Containers: build, scan, push (push to GHCR only on main)
  # -------------------------------------------------------------------------
  containers:
    name: "Containers — Build, Scan & Push"
    runs-on: ubuntu-latest
    needs: [build-and-test-frontend, build-and-test-backend]

    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -- Compute image tags ------------------------------------------------
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Compute image names and tags
        id: meta
        run: |
          # Ensure image names are lowercase
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          FRONTEND_IMAGE="ghcr.io/${REPO_LOWER}/integrisight-frontend"
          BACKEND_IMAGE="ghcr.io/${REPO_LOWER}/integrisight-backend"
          WORKER_SCAN_GATE_IMAGE="ghcr.io/${REPO_LOWER}/integrisight-worker-scan-gate"
          WORKER_PARSER_IMAGE="ghcr.io/${REPO_LOWER}/integrisight-worker-parser"

          # Build tag list — always include the short-SHA tag
          FRONTEND_TAGS="${FRONTEND_IMAGE}:${SHORT_SHA}"
          BACKEND_TAGS="${BACKEND_IMAGE}:${SHORT_SHA}"
          WORKER_SCAN_GATE_TAGS="${WORKER_SCAN_GATE_IMAGE}:${SHORT_SHA}"
          WORKER_PARSER_TAGS="${WORKER_PARSER_IMAGE}:${SHORT_SHA}"

          # On pushes to main or workflow dispatch, also tag as latest
          if [[ ("${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch") && "${{ github.ref }}" == "refs/heads/main" ]]; then
            FRONTEND_TAGS="${FRONTEND_TAGS}
          ${FRONTEND_IMAGE}:latest"
            BACKEND_TAGS="${BACKEND_TAGS}
          ${BACKEND_IMAGE}:latest"
            WORKER_SCAN_GATE_TAGS="${WORKER_SCAN_GATE_TAGS}
          ${WORKER_SCAN_GATE_IMAGE}:latest"
            WORKER_PARSER_TAGS="${WORKER_PARSER_TAGS}
          ${WORKER_PARSER_IMAGE}:latest"
          fi

          # Persist outputs
          {
            echo "frontend_image=${FRONTEND_IMAGE}"
            echo "backend_image=${BACKEND_IMAGE}"
            echo "worker_scan_gate_image=${WORKER_SCAN_GATE_IMAGE}"
            echo "worker_parser_image=${WORKER_PARSER_IMAGE}"
            echo "frontend_tags<<EOF"
            echo "${FRONTEND_TAGS}"
            echo "EOF"
            echo "backend_tags<<EOF"
            echo "${BACKEND_TAGS}"
            echo "EOF"
            echo "worker_scan_gate_tags<<EOF"
            echo "${WORKER_SCAN_GATE_TAGS}"
            echo "EOF"
            echo "worker_parser_tags<<EOF"
            echo "${WORKER_PARSER_TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -- Build images (load locally for scanning) ----------------------------
      - name: Build frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          load: true
          tags: ${{ steps.meta.outputs.frontend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          load: true
          tags: ${{ steps.meta.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker-scan-gate image
        id: build-worker-scan-gate
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile.worker
          load: true
          tags: ${{ steps.meta.outputs.worker_scan_gate_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker-parser image
        id: build-worker-parser
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          file: src/backend/Dockerfile.worker
          load: true
          tags: ${{ steps.meta.outputs.worker_parser_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- Scan images with Trivy ---------------------------------------------
      - name: Scan frontend image (Trivy)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.frontend_image }}:${{ env.SHORT_SHA }}"
          format: sarif
          output: frontend-trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan backend image (Trivy)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.backend_image }}:${{ env.SHORT_SHA }}"
          format: sarif
          output: backend-trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan worker-scan-gate image (Trivy)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.worker_scan_gate_image }}:${{ env.SHORT_SHA }}"
          format: sarif
          output: worker-scan-gate-trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan worker-parser image (Trivy)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.worker_parser_image }}:${{ env.SHORT_SHA }}"
          format: sarif
          output: worker-parser-trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      # -- Upload SARIF to GitHub Security ------------------------------------
      - name: Upload frontend SARIF
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-trivy-results.sarif
          category: trivy-frontend

      - name: Upload backend SARIF
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-trivy-results.sarif
          category: trivy-backend

      - name: Upload worker-scan-gate SARIF
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: worker-scan-gate-trivy-results.sarif
          category: trivy-worker-scan-gate

      - name: Upload worker-parser SARIF
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: worker-parser-trivy-results.sarif
          category: trivy-worker-parser

      # -- Push images to GHCR (push to main or workflow dispatch) --------------
      - name: Push frontend image
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        id: push-frontend
        run: |
          FRONTEND_IMAGE="${{ steps.meta.outputs.frontend_image }}"
          RESULT=$(docker push --all-tags "${FRONTEND_IMAGE}" 2>&1)
          echo "${RESULT}"
          DIGEST=$(echo "${RESULT}" | grep -oP 'digest: \Ksha256:[a-f0-9]+' | tail -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Push backend image
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        id: push-backend
        run: |
          BACKEND_IMAGE="${{ steps.meta.outputs.backend_image }}"
          RESULT=$(docker push --all-tags "${BACKEND_IMAGE}" 2>&1)
          echo "${RESULT}"
          DIGEST=$(echo "${RESULT}" | grep -oP 'digest: \Ksha256:[a-f0-9]+' | tail -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Push worker-scan-gate image
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        id: push-worker-scan-gate
        run: |
          WORKER_SCAN_GATE_IMAGE="${{ steps.meta.outputs.worker_scan_gate_image }}"
          RESULT=$(docker push --all-tags "${WORKER_SCAN_GATE_IMAGE}" 2>&1)
          echo "${RESULT}"
          DIGEST=$(echo "${RESULT}" | grep -oP 'digest: \Ksha256:[a-f0-9]+' | tail -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Push worker-parser image
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        id: push-worker-parser
        run: |
          WORKER_PARSER_IMAGE="${{ steps.meta.outputs.worker_parser_image }}"
          RESULT=$(docker push --all-tags "${WORKER_PARSER_IMAGE}" 2>&1)
          echo "${RESULT}"
          DIGEST=$(echo "${RESULT}" | grep -oP 'digest: \Ksha256:[a-f0-9]+' | tail -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # -- Container metadata (push to main or workflow dispatch) --------------
      - name: Generate container metadata
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          FRONTEND_DIGEST: ${{ steps.push-frontend.outputs.digest }}
          BACKEND_DIGEST: ${{ steps.push-backend.outputs.digest }}
          WORKER_SCAN_GATE_DIGEST: ${{ steps.push-worker-scan-gate.outputs.digest }}
          WORKER_PARSER_DIGEST: ${{ steps.push-worker-parser.outputs.digest }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          cat > container-metadata.json <<EOF
          {
            "build": {
              "commit_sha": "${{ github.sha }}",
              "short_sha": "${SHORT_SHA}",
              "ref": "${{ github.ref_name }}",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            },
            "containers": [
              {
                "name": "integrisight-frontend",
                "registry": "ghcr.io",
                "repository": "${REPO_LOWER}/integrisight-frontend",
                "tag": "${SHORT_SHA}",
                "full_image": "ghcr.io/${REPO_LOWER}/integrisight-frontend:${SHORT_SHA}",
                "digest": "${FRONTEND_DIGEST}"
              },
              {
                "name": "integrisight-backend",
                "registry": "ghcr.io",
                "repository": "${REPO_LOWER}/integrisight-backend",
                "tag": "${SHORT_SHA}",
                "full_image": "ghcr.io/${REPO_LOWER}/integrisight-backend:${SHORT_SHA}",
                "digest": "${BACKEND_DIGEST}"
              },
              {
                "name": "integrisight-worker-scan-gate",
                "registry": "ghcr.io",
                "repository": "${REPO_LOWER}/integrisight-worker-scan-gate",
                "tag": "${SHORT_SHA}",
                "full_image": "ghcr.io/${REPO_LOWER}/integrisight-worker-scan-gate:${SHORT_SHA}",
                "digest": "${WORKER_SCAN_GATE_DIGEST}"
              },
              {
                "name": "integrisight-worker-parser",
                "registry": "ghcr.io",
                "repository": "${REPO_LOWER}/integrisight-worker-parser",
                "tag": "${SHORT_SHA}",
                "full_image": "ghcr.io/${REPO_LOWER}/integrisight-worker-parser:${SHORT_SHA}",
                "digest": "${WORKER_PARSER_DIGEST}"
              }
            ]
          }
          EOF

      - name: Upload container metadata
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: container-metadata
          path: container-metadata.json
          retention-days: 90
