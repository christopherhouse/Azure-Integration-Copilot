# =============================================================================
# CI Workflow — Integrisight.ai  (reusable child workflow)
# =============================================================================
# Called by the parent cicd.yml workflow.
# Jobs: frontend build/test, frontend e2e (Playwright), backend build/test,
#        Rust build/test, Go graph builder build/test, Bicep lint/build, container build/scan/push.
# =============================================================================

name: CI

on:
  workflow_call:

permissions:
  contents: read
  id-token: write          # OIDC auth to Azure
  packages: write          # Push to GHCR
  security-events: write   # Upload SARIF
  checks: write            # Publish test results
  pull-requests: write     # Test reporter PR annotations

# ---------------------------------------------------------------------------
# Job 1 — Frontend: build, lint, test
# ---------------------------------------------------------------------------
jobs:
  build-and-test-frontend:
    name: "Frontend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Audit production dependencies
        working-directory: src/frontend
        run: npm audit --audit-level=high --omit=dev || true

      - name: Lint
        working-directory: src/frontend
        run: npm run lint

      - name: Build
        working-directory: src/frontend
        run: npm run build

      - name: Run tests
        working-directory: src/frontend
        env:
          JEST_JUNIT_OUTPUT_DIR: ../../test-results
          JEST_JUNIT_OUTPUT_NAME: frontend-results.xml
        run: npm test -- --ci --reporters=default --reporters=jest-junit

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Tests
          path: test-results/frontend-results.xml
          reporter: jest-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Job 2 — Frontend: Playwright end-to-end tests
  # -------------------------------------------------------------------------
  e2e-frontend:
    name: "Frontend — E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: [build-and-test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            src/frontend/package-lock.json
            tests/playwright/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Install Playwright test dependencies
        working-directory: tests/playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        working-directory: tests/playwright
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Publish e2e test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend E2E Tests (Playwright)
          path: tests/playwright/playwright-results.xml
          reporter: jest-junit
          fail-on-error: true

      - name: Upload Playwright test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/playwright/test-results/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Job 3 — Backend: build, lint, test
  # -------------------------------------------------------------------------
  build-and-test-backend:
    name: "Backend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v7

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: src/backend
        run: uv sync --frozen

      - name: Audit Python dependencies
        working-directory: src/backend
        run: uv run pip-audit --strict --desc || true

      - name: Lint
        working-directory: src/backend
        run: uv run ruff check .

      - name: Run tests
        working-directory: src/backend
        run: uv run pytest --junitxml=../../test-results/backend-results.xml -v

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: test-results/backend-results.xml
          reporter: java-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Job 4 — Rust parser worker: build, lint, test
  # -------------------------------------------------------------------------
  build-and-test-rust:
    name: "Rust Parser — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src/worker-parser-rust/target
          key: rust-${{ runner.os }}-${{ hashFiles('src/worker-parser-rust/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Audit Rust dependencies
        working-directory: src/worker-parser-rust
        run: |
          command -v cargo-audit || cargo install cargo-audit --quiet
          cargo audit || true

      - name: Lint (clippy)
        working-directory: src/worker-parser-rust
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: src/worker-parser-rust
        run: cargo build --release

      - name: Run tests
        working-directory: src/worker-parser-rust
        run: |
          mkdir -p ../../test-results
          cargo test -- --format=pretty 2>&1 | tee ../../test-results/rust-results.txt

  # -------------------------------------------------------------------------
# Job 5 — F# analysis worker: build, test
  # (Job 6 below — Go graph builder worker)
  # -------------------------------------------------------------------------
  build-and-test-analysis-fsharp:
    name: "F# Analysis Worker — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/worker-analysis-fsharp/**/*.fsproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore NuGet dependencies
        working-directory: src/worker-analysis-fsharp
        run: dotnet restore

      - name: Build (Release)
        working-directory: src/worker-analysis-fsharp
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: src/worker-analysis-fsharp
        continue-on-error: true
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=../../test-results/analysis-fsharp-results.trx"

      - name: Publish test results
        if: always() && hashFiles('test-results/analysis-fsharp-results.trx') != ''
        uses: dorny/test-reporter@v1
        with:
          name: F# Analysis Worker Tests
          path: test-results/analysis-fsharp-results.trx
          reporter: dotnet-trx
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Job 6 — Go graph builder worker: build, lint, test
  # -------------------------------------------------------------------------
  build-and-test-go:
    name: "Go Graph Builder — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: src/worker-graph-builder-go/go.sum

      - name: Audit Go dependencies
        working-directory: src/worker-graph-builder-go
        run: |
          go list -m -json all 2>/dev/null | grep -q '"Path"' && echo "modules listed" || true

      - name: Vet
        working-directory: src/worker-graph-builder-go
        run: go vet ./...

      - name: Build
        working-directory: src/worker-graph-builder-go
        run: go build ./...

      - name: Run tests
        working-directory: src/worker-graph-builder-go
        run: |
          mkdir -p ../../test-results
          go test ./... -v 2>&1 | tee ../../test-results/go-graph-builder-results.txt

  # -------------------------------------------------------------------------
  # Job 7 — Bicep: lint, build, publish artifacts
  # -------------------------------------------------------------------------
  bicep-build:
    name: "Bicep — Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Bicep templates
        working-directory: infra/bicep
        run: |
          echo "::group::Linting main.bicep"
          az bicep lint --file main.bicep
          echo "::endgroup::"

          echo "::group::Linting front-door-deploy.bicep"
          az bicep lint --file front-door-deploy.bicep
          echo "::endgroup::"

          for module in modules/*.bicep; do
            echo "::group::Linting ${module}"
            az bicep lint --file "${module}"
            echo "::endgroup::"
          done

      - name: Build Bicep to ARM JSON
        working-directory: infra/bicep
        run: |
          mkdir -p ../../bicep-compiled
          az bicep build --file main.bicep --outfile ../../bicep-compiled/main.json
          az bicep build --file front-door-deploy.bicep --outfile ../../bicep-compiled/front-door-deploy.json

      - name: Upload compiled Bicep artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bicep-compiled
          path: |
            bicep-compiled/main.json
            bicep-compiled/front-door-deploy.json
            infra/bicep/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Job 8 — Container build matrix: build, scan, push (parallel per image)
  # -------------------------------------------------------------------------
  container-build:
    name: "Container — ${{ matrix.image_name }}"
    runs-on: ubuntu-latest
    needs: [build-and-test-frontend, build-and-test-backend, build-and-test-rust, build-and-test-go, e2e-frontend, build-and-test-analysis-fsharp]

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            image_name: integrisight-frontend
            context: src/frontend
            dockerfile: Dockerfile
            cache_scope: frontend
          - name: backend
            image_name: integrisight-backend
            context: src/backend
            dockerfile: Dockerfile
            cache_scope: backend
          - name: worker-scan-gate
            image_name: integrisight-worker-scan-gate
            context: src/backend
            dockerfile: Dockerfile.worker
            cache_scope: worker             # shared — same context & Dockerfile
          - name: worker-parser
            image_name: integrisight-worker-parser
            context: src/backend
            dockerfile: Dockerfile.worker
            cache_scope: worker             # shared — same context & Dockerfile
          - name: worker-graph-builder
            image_name: integrisight-worker-graph-builder
            context: src/backend
            dockerfile: Dockerfile.worker
            cache_scope: worker             # shared — same context & Dockerfile
          - name: worker-analysis
            image_name: integrisight-worker-analysis
            context: src/backend
            dockerfile: Dockerfile.worker
            cache_scope: worker             # shared — same context & Dockerfile
          - name: worker-notification
            image_name: integrisight-worker-notification
            context: src/backend
            dockerfile: Dockerfile.worker
            cache_scope: worker             # shared — same context & Dockerfile
          - name: worker-parser-rust
            image_name: integrisight-worker-parser-rust
            context: src/worker-parser-rust
            dockerfile: Dockerfile
            cache_scope: worker-parser-rust
          - name: worker-graph-builder-go
            image_name: integrisight-worker-graph-builder-go
            context: src/worker-graph-builder-go
            dockerfile: Dockerfile
            cache_scope: worker-graph-builder-go
          - name: worker-analysis-fsharp
            image_name: integrisight-worker-analysis-fsharp
            context: src/worker-analysis-fsharp
            dockerfile: Dockerfile
            cache_scope: worker-analysis-fsharp

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -- Compute image tags ------------------------------------------------
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Compute image tags
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/${{ matrix.image_name }}"

          # Always include the short-SHA tag
          TAGS="${IMAGE}:${SHORT_SHA}"

          # On pushes to main or workflow dispatch, also tag as latest
          if [[ ("${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch") && "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS}
          ${IMAGE}:latest"
          fi

          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -- Build image (load locally for scanning) ----------------------------
      - name: Build ${{ matrix.image_name }} image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

      # -- Scan image with Trivy ---------------------------------------------
      - name: Scan ${{ matrix.image_name }} image (Trivy)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.image }}:${{ env.SHORT_SHA }}"
          format: sarif
          output: ${{ matrix.name }}-trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload ${{ matrix.image_name }} SARIF
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.name }}-trivy-results.sarif
          category: trivy-${{ matrix.name }}

      # -- Push image to GHCR (push to main or workflow dispatch) --------------
      - name: Push ${{ matrix.image_name }} image
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        id: push
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          RESULT=$(docker push --all-tags "${IMAGE}" 2>&1)
          echo "${RESULT}"
          DIGEST=$(echo "${RESULT}" | grep -oP 'digest: \Ksha256:[a-f0-9]+' | tail -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # -- Per-container metadata fragment ------------------------------------
      - name: Generate container metadata fragment
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          jq -n \
            --arg name        "${{ matrix.image_name }}" \
            --arg registry    "${{ env.REGISTRY }}" \
            --arg repository  "${REPO_LOWER}/${{ matrix.image_name }}" \
            --arg tag         "${SHORT_SHA}" \
            --arg full_image  "${{ env.REGISTRY }}/${REPO_LOWER}/${{ matrix.image_name }}:${SHORT_SHA}" \
            --arg digest      "${{ steps.push.outputs.digest }}" \
            '{name: $name, registry: $registry, repository: $repository, tag: $tag, full_image: $full_image, digest: $digest}' \
            > ${{ matrix.name }}-metadata.json

      - name: Upload container metadata fragment
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: container-meta-${{ matrix.name }}
          path: ${{ matrix.name }}-metadata.json
          retention-days: 1

  # -------------------------------------------------------------------------
  # Job 9 — Aggregate container metadata for CD consumption
  # -------------------------------------------------------------------------
  container-metadata:
    name: "Container Metadata — Aggregate"
    runs-on: ubuntu-latest
    needs: [container-build]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Download all container metadata fragments
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: container-meta-*
          merge-multiple: true

      - name: Assemble container-metadata.json
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          jq -n \
            --arg commit_sha  "${{ github.sha }}" \
            --arg short_sha   "${SHORT_SHA}" \
            --arg ref         "${{ github.ref_name }}" \
            --arg run_id      "${{ github.run_id }}" \
            --arg run_number  "${{ github.run_number }}" \
            --arg timestamp   "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --slurpfile containers <(jq -s '.' *-metadata.json) \
            '{build: {commit_sha: $commit_sha, short_sha: $short_sha, ref: $ref, run_id: $run_id, run_number: $run_number, timestamp: $timestamp}, containers: $containers[0]}' \
            > container-metadata.json
          echo "--- Combined container metadata ---"
          cat container-metadata.json

      - name: Upload container metadata
        uses: actions/upload-artifact@v4
        with:
          name: container-metadata
          path: container-metadata.json
          retention-days: 90
