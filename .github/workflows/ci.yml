# =============================================================================
# CI Workflow — Azure Integration Copilot
# =============================================================================
# Runs on every PR targeting main and on pushes to main.
# Jobs: frontend build/test, backend build/test, Terraform plan, container
#        build/scan/push.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write          # OIDC auth to Azure
  packages: write          # Push to GHCR
  security-events: write   # Upload SARIF
  checks: write            # Publish test results
  pull-requests: write     # Test reporter PR annotations

# ---------------------------------------------------------------------------
# Job 1 — Frontend: build, lint, test
# ---------------------------------------------------------------------------
jobs:
  build-and-test-frontend:
    name: "Frontend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Lint
        working-directory: src/frontend
        run: npm run lint

      - name: Build
        working-directory: src/frontend
        run: npm run build

      - name: Run tests
        working-directory: src/frontend
        env:
          JEST_JUNIT_OUTPUT_DIR: ../../test-results
          JEST_JUNIT_OUTPUT_NAME: frontend-results.xml
        run: npm test -- --ci --reporters=default --reporters=jest-junit

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Tests
          path: test-results/frontend-results.xml
          reporter: jest-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Job 2 — Backend: build, lint, test
  # -------------------------------------------------------------------------
  build-and-test-backend:
    name: "Backend — Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: src/backend
        run: uv sync --frozen

      - name: Lint
        working-directory: src/backend
        run: uv run ruff check .

      - name: Run tests
        working-directory: src/backend
        run: uv run pytest --junitxml=../../test-results/backend-results.xml -v

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Tests
          path: test-results/backend-results.xml
          reporter: java-junit
          fail-on-error: true

  # -------------------------------------------------------------------------
  # Job 3 — Terraform: plan dev environment
  # -------------------------------------------------------------------------
  terraform-plan:
    name: "Terraform — Plan (dev)"
    runs-on: ubuntu-latest
    environment: dev

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        working-directory: infra/terraform/environments/dev
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform/environments/dev
        continue-on-error: true
        run: |
          terraform plan \
            -var-file="dev.tfvars" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -out=tfplan-dev

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/terraform/environments/dev/tfplan-dev
          retention-days: 7

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # -------------------------------------------------------------------------
  # Job 4 — Containers: build, scan, push (push to GHCR only on main)
  # -------------------------------------------------------------------------
  containers:
    name: "Containers — Build, Scan & Push"
    runs-on: ubuntu-latest
    needs: [build-and-test-frontend, build-and-test-backend]

    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -- Compute image tags ------------------------------------------------
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Compute image names and tags
        id: meta
        run: |
          # Ensure image names are lowercase
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          FRONTEND_IMAGE="ghcr.io/${REPO_LOWER}/frontend"
          BACKEND_IMAGE="ghcr.io/${REPO_LOWER}/backend"

          # Build tag list — always include the short-SHA tag
          FRONTEND_TAGS="${FRONTEND_IMAGE}:${SHORT_SHA}"
          BACKEND_TAGS="${BACKEND_IMAGE}:${SHORT_SHA}"

          # On pushes to main, also tag as latest
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            FRONTEND_TAGS="${FRONTEND_TAGS}
          ${FRONTEND_IMAGE}:latest"
            BACKEND_TAGS="${BACKEND_TAGS}
          ${BACKEND_IMAGE}:latest"
          fi

          # Persist outputs
          {
            echo "frontend_image=${FRONTEND_IMAGE}"
            echo "backend_image=${BACKEND_IMAGE}"
            echo "frontend_tags<<EOF"
            echo "${FRONTEND_TAGS}"
            echo "EOF"
            echo "backend_tags<<EOF"
            echo "${BACKEND_TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -- Build images (load locally for scanning) ----------------------------
      - name: Build frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          load: true
          tags: ${{ steps.meta.outputs.frontend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          load: true
          tags: ${{ steps.meta.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- Scan images with Trivy ---------------------------------------------
      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.frontend_image }}:${{ env.SHORT_SHA }}"
          format: sarif
          output: frontend-trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ steps.meta.outputs.backend_image }}:${{ env.SHORT_SHA }}"
          format: sarif
          output: backend-trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      # -- Upload SARIF to GitHub Security ------------------------------------
      - name: Upload frontend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-trivy-results.sarif
          category: trivy-frontend

      - name: Upload backend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-trivy-results.sarif
          category: trivy-backend

      # -- Push images to GHCR (only on push to main) -------------------------
      - name: Push frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: push-frontend
        run: |
          FRONTEND_IMAGE="${{ steps.meta.outputs.frontend_image }}"
          RESULT=$(docker push --all-tags "${FRONTEND_IMAGE}" 2>&1)
          echo "${RESULT}"
          DIGEST=$(echo "${RESULT}" | grep -oP 'digest: \Ksha256:[a-f0-9]+' | tail -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: push-backend
        run: |
          BACKEND_IMAGE="${{ steps.meta.outputs.backend_image }}"
          RESULT=$(docker push --all-tags "${BACKEND_IMAGE}" 2>&1)
          echo "${RESULT}"
          DIGEST=$(echo "${RESULT}" | grep -oP 'digest: \Ksha256:[a-f0-9]+' | tail -1)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # -- Container metadata (only on push to main) -------------------------
      - name: Generate container metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FRONTEND_DIGEST: ${{ steps.push-frontend.outputs.digest }}
          BACKEND_DIGEST: ${{ steps.push-backend.outputs.digest }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          cat > container-metadata.json <<EOF
          {
            "build": {
              "commit_sha": "${{ github.sha }}",
              "short_sha": "${SHORT_SHA}",
              "ref": "${{ github.ref_name }}",
              "run_id": "${{ github.run_id }}",
              "run_number": "${{ github.run_number }}",
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            },
            "containers": [
              {
                "name": "frontend",
                "registry": "ghcr.io",
                "repository": "${REPO_LOWER}/frontend",
                "tag": "${SHORT_SHA}",
                "full_image": "ghcr.io/${REPO_LOWER}/frontend:${SHORT_SHA}",
                "digest": "${FRONTEND_DIGEST}"
              },
              {
                "name": "backend",
                "registry": "ghcr.io",
                "repository": "${REPO_LOWER}/backend",
                "tag": "${SHORT_SHA}",
                "full_image": "ghcr.io/${REPO_LOWER}/backend:${SHORT_SHA}",
                "digest": "${BACKEND_DIGEST}"
              }
            ]
          }
          EOF

      - name: Upload container metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: container-metadata
          path: container-metadata.json
          retention-days: 90
