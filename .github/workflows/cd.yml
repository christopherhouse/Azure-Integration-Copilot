      - name: Capture deployment outputs
        id: bicep-outputs
        run: |
          echo "acr_login_server=${{ steps.deploy.outputs.containerRegistryLoginServer }}" >> "$GITHUB_OUTPUT"
          echo "acr_name=${{ steps.deploy.outputs.containerRegistryName }}" >> "$GITHUB_OUTPUT"
          echo "resource_group=${{ steps.deploy.outputs.resourceGroupName }}" >> "$GITHUB_OUTPUT"
          echo "cae_name=${{ steps.deploy.outputs.containerAppsEnvironmentName }}" >> "$GITHUB_OUTPUT"
          echo "frontend_identity_name=${{ steps.deploy.outputs.frontendIdentityName }}" >> "$GITHUB_OUTPUT"
          echo "backend_identity_name=${{ steps.deploy.outputs.backendIdentityName }}" >> "$GITHUB_OUTPUT"
          echo "worker_identity_name=${{ steps.deploy.outputs.workerIdentityName }}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Prod — Promote Containers (GHCR → ACR)
  # ---------------------------------------------------------------------------
  promote-containers-prod:
    name: "Prod — Promote Containers"
    needs: [deploy-infra-prod]
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_tag: ${{ steps.metadata.outputs.tag }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download container metadata
        uses: actions/download-artifact@v4.1.3
        with:
          name: container-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse container metadata
        id: metadata
        run: |
          cat container-metadata.json
          FRONTEND_IMAGE=$(jq -r '.containers[] | select(.name=="frontend") | .full_image' container-metadata.json)
          BACKEND_IMAGE=$(jq -r '.containers[] | select(.name=="backend") | .full_image' container-metadata.json)
          WORKER_IMAGE=$(jq -r '.containers[] | select(.name=="worker") | .full_image' container-metadata.json)
          TAG=$(jq -r '.containers[] | select(.name=="frontend") | .tag' container-metadata.json)
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "worker_image=${WORKER_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Import frontend image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.frontend_image }}" \
            --image "frontend:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import backend image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.backend_image }}" \
            --image "backend:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import worker image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
