            --image "${{ needs.deploy-infra-prod.outputs.acr_login_server }}/backend:${{ needs.promote-containers-prod.outputs.image_tag }}" \
            --target-port 8000 \
            --identity "${{ steps.identities.outputs.backend_id }}" \
            --registry-server "${{ needs.deploy-infra-prod.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 10 \
            --env-vars "PORT=8000"

