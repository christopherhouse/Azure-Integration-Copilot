# =============================================================================
# CD Workflow — Integrisight.ai  (reusable child workflow)
# =============================================================================
# Called by the parent cicd.yml workflow after CI succeeds on the main branch.
# Deploys infrastructure (Bicep) and container apps (script) to dev, then prod.
#
# Jobs per environment:
#   1. Deploy Infrastructure — az deployment group create with Bicep
#   2. Promote Containers    — import images from GHCR → ACR
#   3. Deploy Container Apps — run deploy-container-app.sh for each service
# =============================================================================

name: CD

on:
  workflow_call:

permissions:
  contents: read
  id-token: write          # OIDC auth to Azure
  packages: read           # Pull from GHCR
  actions: read            # Download artifacts from triggering workflow

env:
  LOCK_NAME: aic-rg-cannotdelete

# =============================================================================
# DEV ENVIRONMENT
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # Dev — Deploy Infrastructure (Bicep)
  # ---------------------------------------------------------------------------
  deploy-infra-dev:
    name: "Dev — Deploy Infrastructure"
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      acr_login_server: ${{ steps.bicep-outputs.outputs.acr_login_server }}
      acr_name: ${{ steps.bicep-outputs.outputs.acr_name }}
      resource_group: ${{ steps.bicep-outputs.outputs.resource_group }}
      cae_name: ${{ steps.bicep-outputs.outputs.cae_name }}
      frontend_identity_name: ${{ steps.bicep-outputs.outputs.frontend_identity_name }}
      backend_identity_name: ${{ steps.bicep-outputs.outputs.backend_identity_name }}
      worker_identity_name: ${{ steps.bicep-outputs.outputs.worker_identity_name }}
      cosmos_db_endpoint: ${{ steps.bicep-outputs.outputs.cosmos_db_endpoint }}
      blob_storage_endpoint: ${{ steps.bicep-outputs.outputs.blob_storage_endpoint }}
      event_grid_endpoint: ${{ steps.bicep-outputs.outputs.event_grid_endpoint }}
      event_grid_topic_name: ${{ steps.bicep-outputs.outputs.event_grid_topic_name }}
      web_pubsub_endpoint: ${{ steps.bicep-outputs.outputs.web_pubsub_endpoint }}
      appinsights_connection_string: ${{ steps.bicep-outputs.outputs.appinsights_connection_string }}
      backend_identity_client_id: ${{ steps.bicep-outputs.outputs.backend_identity_client_id }}
      worker_identity_client_id: ${{ steps.bicep-outputs.outputs.worker_identity_client_id }}
      frontend_custom_domain: ${{ steps.bicep-outputs.outputs.frontend_custom_domain }}
      backend_custom_domain: ${{ steps.bicep-outputs.outputs.backend_custom_domain }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Remove resource lock (if exists)
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          az lock delete \
            --name "${LOCK_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            2>/dev/null || true

      - name: Deploy Bicep infrastructure
        id: deploy
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          DEPLOYMENT_OUTPUT=$(az deployment group create \
            --name "aic-dev-${{ github.run_number }}" \
            --resource-group "${RESOURCE_GROUP}" \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/environments/dev.bicepparam \
            --query 'properties.outputs' \
            --output json)

          echo "deployment_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "${DEPLOYMENT_OUTPUT}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Capture deployment outputs
        id: bicep-outputs
        run: |
          OUTPUTS='${{ steps.deploy.outputs.deployment_output }}'
          echo "acr_login_server=$(echo "$OUTPUTS" | jq -r '.containerRegistryLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(echo "$OUTPUTS" | jq -r '.containerRegistryName.value')" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(echo "$OUTPUTS" | jq -r '.resourceGroupName.value')" >> "$GITHUB_OUTPUT"
          echo "cae_name=$(echo "$OUTPUTS" | jq -r '.containerAppsEnvironmentName.value')" >> "$GITHUB_OUTPUT"
          echo "frontend_identity_name=$(echo "$OUTPUTS" | jq -r '.frontendIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "backend_identity_name=$(echo "$OUTPUTS" | jq -r '.backendIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "worker_identity_name=$(echo "$OUTPUTS" | jq -r '.workerIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "cosmos_db_endpoint=$(echo "$OUTPUTS" | jq -r '.cosmosDbEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "blob_storage_endpoint=$(echo "$OUTPUTS" | jq -r '.blobStorageEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "event_grid_endpoint=$(echo "$OUTPUTS" | jq -r '.eventGridEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "event_grid_topic_name=$(echo "$OUTPUTS" | jq -r '.eventGridTopicName.value')" >> "$GITHUB_OUTPUT"
          echo "web_pubsub_endpoint=$(echo "$OUTPUTS" | jq -r '.webPubSubEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "appinsights_connection_string=$(echo "$OUTPUTS" | jq -r '.applicationInsightsConnectionString.value')" >> "$GITHUB_OUTPUT"
          echo "backend_identity_client_id=$(echo "$OUTPUTS" | jq -r '.backendIdentityClientId.value')" >> "$GITHUB_OUTPUT"
          echo "worker_identity_client_id=$(echo "$OUTPUTS" | jq -r '.workerIdentityClientId.value')" >> "$GITHUB_OUTPUT"
          echo "frontend_custom_domain=$(echo "$OUTPUTS" | jq -r '.frontendCustomDomain.value')" >> "$GITHUB_OUTPUT"
          echo "backend_custom_domain=$(echo "$OUTPUTS" | jq -r '.backendCustomDomain.value')" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Dev — Promote Containers (GHCR → ACR)
  # ---------------------------------------------------------------------------
  promote-containers-dev:
    name: "Dev — Promote Containers"
    needs: [deploy-infra-dev]
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image_tag: ${{ steps.metadata.outputs.tag }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download container metadata
        uses: actions/download-artifact@v4.1.3
        with:
          name: container-metadata

      - name: Parse container metadata
        id: metadata
        run: |
          cat container-metadata.json
          FRONTEND_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-frontend") | .full_image' container-metadata.json)
          BACKEND_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-backend") | .full_image' container-metadata.json)
          WORKER_SCAN_GATE_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-worker-scan-gate") | .full_image' container-metadata.json)
          WORKER_PARSER_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-worker-parser") | .full_image' container-metadata.json)
          WORKER_GRAPH_BUILDER_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-worker-graph-builder") | .full_image' container-metadata.json)
          TAG=$(jq -r '.containers[] | select(.name=="integrisight-frontend") | .tag' container-metadata.json)
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "worker_scan_gate_image=${WORKER_SCAN_GATE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "worker_parser_image=${WORKER_PARSER_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "worker_graph_builder_image=${WORKER_GRAPH_BUILDER_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Import frontend image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-dev.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.frontend_image }}" \
            --image "integrisight-frontend:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import backend image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-dev.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.backend_image }}" \
            --image "integrisight-backend:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import worker-scan-gate image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-dev.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.worker_scan_gate_image }}" \
            --image "integrisight-worker-scan-gate:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import worker-parser image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-dev.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.worker_parser_image }}" \
            --image "integrisight-worker-parser:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import worker-graph-builder image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-dev.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.worker_graph_builder_image }}" \
            --image "integrisight-worker-graph-builder:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

  # ---------------------------------------------------------------------------
  # Dev — Deploy Container Apps (via script)
  # ---------------------------------------------------------------------------
  deploy-apps-dev:
    name: "Dev — Deploy Container Apps"
    needs: [deploy-infra-dev, promote-containers-dev]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve identity resource IDs
        id: identities
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-dev.outputs.resource_group }}
        run: |
          FRONTEND_ID=$(az identity show --name "${{ needs.deploy-infra-dev.outputs.frontend_identity_name }}" --resource-group "${RESOURCE_GROUP}" --query id --output tsv)
          BACKEND_ID=$(az identity show --name "${{ needs.deploy-infra-dev.outputs.backend_identity_name }}" --resource-group "${RESOURCE_GROUP}" --query id --output tsv)
          WORKER_ID=$(az identity show --name "${{ needs.deploy-infra-dev.outputs.worker_identity_name }}" --resource-group "${RESOURCE_GROUP}" --query id --output tsv)
          echo "frontend_id=${FRONTEND_ID}" >> "$GITHUB_OUTPUT"
          echo "backend_id=${BACKEND_ID}" >> "$GITHUB_OUTPUT"
          echo "worker_id=${WORKER_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy backend Container App
        env:
          BACKEND_ENV_VARS: >-
            PORT=8000
            ENVIRONMENT=dev
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-dev.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-dev.outputs.event_grid_topic_name }}
            WEB_PUBSUB_ENDPOINT=${{ needs.deploy-infra-dev.outputs.web_pubsub_endpoint }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-dev.outputs.backend_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-dev.outputs.appinsights_connection_string }}
            ENTRA_CIAM_TENANT_SUBDOMAIN=${{ secrets.ENTRA_CIAM_TENANT_SUBDOMAIN || vars.ENTRA_CIAM_TENANT_SUBDOMAIN }}
            ENTRA_CIAM_CLIENT_ID=${{ secrets.ENTRA_CIAM_CLIENT_ID || vars.ENTRA_CIAM_CLIENT_ID }}
            CORS_ALLOWED_ORIGINS=https://${{ needs.deploy-infra-dev.outputs.frontend_custom_domain }}
        run: |
          chmod +x infra/scripts/deploy-container-app.sh
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-backend" \
            --resource-group "${{ needs.deploy-infra-dev.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-dev.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-dev.outputs.acr_login_server }}/integrisight-backend:${{ needs.promote-containers-dev.outputs.image_tag }}" \
            --target-port 8000 \
            --identity "${{ steps.identities.outputs.backend_id }}" \
            --registry-server "${{ needs.deploy-infra-dev.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 0 \
            --max-replicas 10 \
            --env-vars "${BACKEND_ENV_VARS}"

      - name: Configure backend CORS policy
        run: |
          az containerapp ingress cors enable \
            --name "ca-backend" \
            --resource-group "${{ needs.deploy-infra-dev.outputs.resource_group }}" \
            --allowed-origins "https://${{ needs.deploy-infra-dev.outputs.frontend_custom_domain }}" \
            --allowed-methods "GET" "POST" "PUT" "PATCH" "DELETE" "OPTIONS" \
            --allowed-headers "Content-Type" "Authorization" "X-Request-ID" \
            --allow-credentials true

      - name: Deploy frontend Container App
        env:
          FRONTEND_ENV_VARS: >-
            PORT=3000
            API_BASE_URL=https://${{ needs.deploy-infra-dev.outputs.backend_custom_domain }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL || vars.NEXTAUTH_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            ENTRA_CIAM_TENANT_SUBDOMAIN=${{ secrets.ENTRA_CIAM_TENANT_SUBDOMAIN || vars.ENTRA_CIAM_TENANT_SUBDOMAIN }}
            ENTRA_CIAM_FRONTEND_CLIENT_ID=${{ secrets.ENTRA_CIAM_FRONTEND_CLIENT_ID || vars.ENTRA_CIAM_FRONTEND_CLIENT_ID }}
            ENTRA_CIAM_FRONTEND_CLIENT_SECRET=${{ secrets.ENTRA_CIAM_FRONTEND_CLIENT_SECRET }}
            ENTRA_CIAM_CLIENT_ID=${{ secrets.ENTRA_CIAM_CLIENT_ID || vars.ENTRA_CIAM_CLIENT_ID }}
            CLARITY_PROJECT_ID=${{ vars.CLARITY_PROJECT_ID }}
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-frontend" \
            --resource-group "${{ needs.deploy-infra-dev.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-dev.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-dev.outputs.acr_login_server }}/integrisight-frontend:${{ needs.promote-containers-dev.outputs.image_tag }}" \
            --target-port 3000 \
            --identity "${{ steps.identities.outputs.frontend_id }}" \
            --registry-server "${{ needs.deploy-infra-dev.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 0 \
            --max-replicas 10 \
            --env-vars "${FRONTEND_ENV_VARS}"

      - name: Deploy worker-scan-gate Container App
        env:
          WORKER_SCAN_GATE_ENV_VARS: >-
            ENVIRONMENT=dev
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-dev.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-dev.outputs.event_grid_topic_name }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-dev.outputs.worker_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-dev.outputs.appinsights_connection_string }}
            WORKER_MODULE=workers.scan_gate.main
        # min-replicas=1: CPU scaler cannot activate from 0 replicas (no CPU to
        # measure). A native KEDA scaler for Event Grid Namespace pull delivery
        # does not exist yet; switch to min=0 if one ships.
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-worker-scan-gate" \
            --resource-group "${{ needs.deploy-infra-dev.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-dev.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-dev.outputs.acr_login_server }}/integrisight-worker-scan-gate:${{ needs.promote-containers-dev.outputs.image_tag }}" \
            --no-ingress \
            --identity "${{ steps.identities.outputs.worker_id }}" \
            --registry-server "${{ needs.deploy-infra-dev.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 5 \
            --scale-rule-name cpu-scaling \
            --scale-rule-type cpu \
            --scale-rule-metadata "type=Utilization value=70" \
            --env-vars "${WORKER_SCAN_GATE_ENV_VARS}"

      - name: Deploy worker-parser Container App
        env:
          WORKER_PARSER_ENV_VARS: >-
            ENVIRONMENT=dev
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-dev.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-dev.outputs.event_grid_topic_name }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-dev.outputs.worker_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-dev.outputs.appinsights_connection_string }}
            WORKER_MODULE=workers.parser.main
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-worker-parser" \
            --resource-group "${{ needs.deploy-infra-dev.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-dev.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-dev.outputs.acr_login_server }}/integrisight-worker-parser:${{ needs.promote-containers-dev.outputs.image_tag }}" \
            --no-ingress \
            --identity "${{ steps.identities.outputs.worker_id }}" \
            --registry-server "${{ needs.deploy-infra-dev.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 5 \
            --scale-rule-name cpu-scaling \
            --scale-rule-type cpu \
            --scale-rule-metadata "type=Utilization value=70" \
            --env-vars "${WORKER_PARSER_ENV_VARS}"

      - name: Deploy worker-graph-builder Container App
        env:
          WORKER_GRAPH_BUILDER_ENV_VARS: >-
            ENVIRONMENT=dev
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-dev.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-dev.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-dev.outputs.event_grid_topic_name }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-dev.outputs.worker_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-dev.outputs.appinsights_connection_string }}
            WORKER_MODULE=workers.graph_builder.main
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-worker-graph-builder" \
            --resource-group "${{ needs.deploy-infra-dev.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-dev.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-dev.outputs.acr_login_server }}/integrisight-worker-graph-builder:${{ needs.promote-containers-dev.outputs.image_tag }}" \
            --no-ingress \
            --identity "${{ steps.identities.outputs.worker_id }}" \
            --registry-server "${{ needs.deploy-infra-dev.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 5 \
            --scale-rule-name cpu-scaling \
            --scale-rule-type cpu \
            --scale-rule-metadata "type=Utilization value=70" \
            --env-vars "${WORKER_GRAPH_BUILDER_ENV_VARS}"

  # ---------------------------------------------------------------------------
  # Dev — Deploy Azure Front Door (after Container Apps exist)
  # ---------------------------------------------------------------------------
  deploy-afd-dev:
    name: "Dev — Deploy Azure Front Door"
    needs: [deploy-infra-dev, deploy-apps-dev]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Front Door
        id: deploy-afd
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-dev.outputs.resource_group }}
        run: |
          DEPLOYMENT_OUTPUT=$(az deployment group create \
            --name "aic-dev-afd-${{ github.run_number }}" \
            --resource-group "${RESOURCE_GROUP}" \
            --parameters infra/bicep/environments/dev-afd.bicepparam \
            --query 'properties.outputs' \
            --output json)

          echo "profile_name=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorProfileName.value')" >> "$GITHUB_OUTPUT"
          echo "frontend_endpoint=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorFrontendEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "backend_endpoint=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorBackendEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "pubsub_endpoint=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorPubsubEndpoint.value')" >> "$GITHUB_OUTPUT"

      - name: Display AFD endpoints and DNS validation info
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-dev.outputs.resource_group }}
          PROFILE_NAME: ${{ steps.deploy-afd.outputs.profile_name }}
          FRONTEND_ENDPOINT: ${{ steps.deploy-afd.outputs.frontend_endpoint }}
          BACKEND_ENDPOINT: ${{ steps.deploy-afd.outputs.backend_endpoint }}
          PUBSUB_ENDPOINT: ${{ steps.deploy-afd.outputs.pubsub_endpoint }}
        run: |
          echo "========================================"
          echo " Azure Front Door Deployment Complete"
          echo "========================================"
          echo ""
          echo "AFD Endpoints:"
          echo "  Frontend : ${FRONTEND_ENDPOINT}"
          echo "  Backend  : ${BACKEND_ENDPOINT}"
          echo "  PubSub   : ${PUBSUB_ENDPOINT}"
          echo ""
          echo "DNS Validation Information:"
          echo "----------------------------------------"

          DOMAINS=("cd-frontend" "cd-backend" "cd-pubsub")
          ENDPOINTS=("${FRONTEND_ENDPOINT}" "${BACKEND_ENDPOINT}" "${PUBSUB_ENDPOINT}")

          for i in "${!DOMAINS[@]}"; do
            DOMAIN_NAME="${DOMAINS[$i]}"
            CNAME_TARGET="${ENDPOINTS[$i]}"

            DOMAIN_INFO=$(az afd custom-domain show \
              --profile-name "${PROFILE_NAME}" \
              --resource-group "${RESOURCE_GROUP}" \
              --custom-domain-name "${DOMAIN_NAME}" \
              --query '{hostname: hostName, validationToken: validationProperties.validationToken}' \
              --output json)

            HOSTNAME=$(echo "$DOMAIN_INFO" | jq -r '.hostname')
            TOKEN=$(echo "$DOMAIN_INFO" | jq -r '.validationToken // "N/A"')

            echo ""
            echo "  Domain       : ${HOSTNAME}"
            echo "  TXT Record   : _dnsauth.${HOSTNAME}"
            echo "  TXT Token    : ${TOKEN}"
            echo "  CNAME Record : ${HOSTNAME} → ${CNAME_TARGET}"
          done

          echo ""
          echo "========================================"

      - name: Configure Cloudflare DNS records
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-dev.outputs.resource_group }}
          PROFILE_NAME: ${{ steps.deploy-afd.outputs.profile_name }}
          FRONTEND_ENDPOINT: ${{ steps.deploy-afd.outputs.frontend_endpoint }}
          BACKEND_ENDPOINT: ${{ steps.deploy-afd.outputs.backend_endpoint }}
          PUBSUB_ENDPOINT: ${{ steps.deploy-afd.outputs.pubsub_endpoint }}
          CLOUDFLARE_DNS_ZONE_ID: ${{ vars.CLOUDFLARE_DNS_ZONE_ID }}
          CLOUDFLARE_DNS_API_KEY: ${{ secrets.CLOUDFLARE_DNS_API_KEY }}
          CLOUDFLARE_DEBUG: ${{ vars.CLOUDFLARE_DEBUG }}
        run: |
          chmod +x infra/scripts/configure-cloudflare-dns.sh
          DEBUG_FLAG=""
          if [[ "${CLOUDFLARE_DEBUG}" == "true" ]]; then
            DEBUG_FLAG="--debug"
          fi
          ./infra/scripts/configure-cloudflare-dns.sh \
            --profile-name "${PROFILE_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --cloudflare-zone-id "${CLOUDFLARE_DNS_ZONE_ID}" \
            --cloudflare-api-key "${CLOUDFLARE_DNS_API_KEY}" \
            --domains "cd-frontend,cd-backend,cd-pubsub" \
            --endpoints "${FRONTEND_ENDPOINT},${BACKEND_ENDPOINT},${PUBSUB_ENDPOINT}" \
            ${DEBUG_FLAG}

  # ---------------------------------------------------------------------------
  # Dev — Restore Resource Lock (always runs after deployment completes)
  # ---------------------------------------------------------------------------
  restore-lock-dev:
    name: "Dev — Restore Resource Lock"
    needs: [deploy-infra-dev, deploy-afd-dev]
    if: ${{ always() && needs.deploy-infra-dev.result != 'skipped' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Add resource lock
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          az lock create \
            --name "${LOCK_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --lock-type CanNotDelete \
            --notes "Prevents accidental deletion of resources. Managed by CI/CD pipeline."

  # ---------------------------------------------------------------------------
  # Prod — Deploy Infrastructure (Bicep)
  # ---------------------------------------------------------------------------
  deploy-infra-prod:
    name: "Prod — Deploy Infrastructure"
    needs: [deploy-afd-dev]
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      acr_login_server: ${{ steps.bicep-outputs.outputs.acr_login_server }}
      acr_name: ${{ steps.bicep-outputs.outputs.acr_name }}
      resource_group: ${{ steps.bicep-outputs.outputs.resource_group }}
      cae_name: ${{ steps.bicep-outputs.outputs.cae_name }}
      frontend_identity_name: ${{ steps.bicep-outputs.outputs.frontend_identity_name }}
      backend_identity_name: ${{ steps.bicep-outputs.outputs.backend_identity_name }}
      worker_identity_name: ${{ steps.bicep-outputs.outputs.worker_identity_name }}
      cosmos_db_endpoint: ${{ steps.bicep-outputs.outputs.cosmos_db_endpoint }}
      blob_storage_endpoint: ${{ steps.bicep-outputs.outputs.blob_storage_endpoint }}
      event_grid_endpoint: ${{ steps.bicep-outputs.outputs.event_grid_endpoint }}
      event_grid_topic_name: ${{ steps.bicep-outputs.outputs.event_grid_topic_name }}
      web_pubsub_endpoint: ${{ steps.bicep-outputs.outputs.web_pubsub_endpoint }}
      appinsights_connection_string: ${{ steps.bicep-outputs.outputs.appinsights_connection_string }}
      backend_identity_client_id: ${{ steps.bicep-outputs.outputs.backend_identity_client_id }}
      worker_identity_client_id: ${{ steps.bicep-outputs.outputs.worker_identity_client_id }}
      frontend_custom_domain: ${{ steps.bicep-outputs.outputs.frontend_custom_domain }}
      backend_custom_domain: ${{ steps.bicep-outputs.outputs.backend_custom_domain }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Remove resource lock (if exists)
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          az lock delete \
            --name "${LOCK_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            2>/dev/null || true

      - name: Deploy Bicep infrastructure
        id: deploy
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          DEPLOYMENT_OUTPUT=$(az deployment group create \
            --name "aic-prod-${{ github.run_number }}" \
            --resource-group "${RESOURCE_GROUP}" \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/environments/prod.bicepparam \
            --query 'properties.outputs' \
            --output json)

          echo "deployment_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "${DEPLOYMENT_OUTPUT}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Capture deployment outputs
        id: bicep-outputs
        run: |
          OUTPUTS='${{ steps.deploy.outputs.deployment_output }}'
          echo "acr_login_server=$(echo "$OUTPUTS" | jq -r '.containerRegistryLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(echo "$OUTPUTS" | jq -r '.containerRegistryName.value')" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(echo "$OUTPUTS" | jq -r '.resourceGroupName.value')" >> "$GITHUB_OUTPUT"
          echo "cae_name=$(echo "$OUTPUTS" | jq -r '.containerAppsEnvironmentName.value')" >> "$GITHUB_OUTPUT"
          echo "frontend_identity_name=$(echo "$OUTPUTS" | jq -r '.frontendIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "backend_identity_name=$(echo "$OUTPUTS" | jq -r '.backendIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "worker_identity_name=$(echo "$OUTPUTS" | jq -r '.workerIdentityName.value')" >> "$GITHUB_OUTPUT"
          echo "cosmos_db_endpoint=$(echo "$OUTPUTS" | jq -r '.cosmosDbEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "blob_storage_endpoint=$(echo "$OUTPUTS" | jq -r '.blobStorageEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "event_grid_endpoint=$(echo "$OUTPUTS" | jq -r '.eventGridEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "event_grid_topic_name=$(echo "$OUTPUTS" | jq -r '.eventGridTopicName.value')" >> "$GITHUB_OUTPUT"
          echo "web_pubsub_endpoint=$(echo "$OUTPUTS" | jq -r '.webPubSubEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "appinsights_connection_string=$(echo "$OUTPUTS" | jq -r '.applicationInsightsConnectionString.value')" >> "$GITHUB_OUTPUT"
          echo "backend_identity_client_id=$(echo "$OUTPUTS" | jq -r '.backendIdentityClientId.value')" >> "$GITHUB_OUTPUT"
          echo "worker_identity_client_id=$(echo "$OUTPUTS" | jq -r '.workerIdentityClientId.value')" >> "$GITHUB_OUTPUT"
          echo "frontend_custom_domain=$(echo "$OUTPUTS" | jq -r '.frontendCustomDomain.value')" >> "$GITHUB_OUTPUT"
          echo "backend_custom_domain=$(echo "$OUTPUTS" | jq -r '.backendCustomDomain.value')" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Prod — Promote Containers (GHCR → ACR)
  # ---------------------------------------------------------------------------
  promote-containers-prod:
    name: "Prod — Promote Containers"
    needs: [deploy-infra-prod]
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_tag: ${{ steps.metadata.outputs.tag }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download container metadata
        uses: actions/download-artifact@v4.1.3
        with:
          name: container-metadata

      - name: Parse container metadata
        id: metadata
        run: |
          cat container-metadata.json
          FRONTEND_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-frontend") | .full_image' container-metadata.json)
          BACKEND_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-backend") | .full_image' container-metadata.json)
          WORKER_SCAN_GATE_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-worker-scan-gate") | .full_image' container-metadata.json)
          WORKER_PARSER_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-worker-parser") | .full_image' container-metadata.json)
          WORKER_GRAPH_BUILDER_IMAGE=$(jq -r '.containers[] | select(.name=="integrisight-worker-graph-builder") | .full_image' container-metadata.json)
          TAG=$(jq -r '.containers[] | select(.name=="integrisight-frontend") | .tag' container-metadata.json)
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "worker_scan_gate_image=${WORKER_SCAN_GATE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "worker_parser_image=${WORKER_PARSER_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "worker_graph_builder_image=${WORKER_GRAPH_BUILDER_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Import frontend image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.frontend_image }}" \
            --image "integrisight-frontend:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import backend image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.backend_image }}" \
            --image "integrisight-backend:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import worker-scan-gate image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.worker_scan_gate_image }}" \
            --image "integrisight-worker-scan-gate:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import worker-parser image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.worker_parser_image }}" \
            --image "integrisight-worker-parser:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

      - name: Import worker-graph-builder image to ACR
        env:
          ACR_NAME: ${{ needs.deploy-infra-prod.outputs.acr_name }}
        run: |
          az acr import \
            --name "${ACR_NAME}" \
            --source "${{ steps.metadata.outputs.worker_graph_builder_image }}" \
            --image "integrisight-worker-graph-builder:${{ steps.metadata.outputs.tag }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --force

  # ---------------------------------------------------------------------------
  # Prod — Deploy Container Apps (via script)
  # ---------------------------------------------------------------------------
  deploy-apps-prod:
    name: "Prod — Deploy Container Apps"
    needs: [deploy-infra-prod, promote-containers-prod]
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve identity resource IDs
        id: identities
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-prod.outputs.resource_group }}
        run: |
          FRONTEND_ID=$(az identity show --name "${{ needs.deploy-infra-prod.outputs.frontend_identity_name }}" --resource-group "${RESOURCE_GROUP}" --query id --output tsv)
          BACKEND_ID=$(az identity show --name "${{ needs.deploy-infra-prod.outputs.backend_identity_name }}" --resource-group "${RESOURCE_GROUP}" --query id --output tsv)
          WORKER_ID=$(az identity show --name "${{ needs.deploy-infra-prod.outputs.worker_identity_name }}" --resource-group "${RESOURCE_GROUP}" --query id --output tsv)
          echo "frontend_id=${FRONTEND_ID}" >> "$GITHUB_OUTPUT"
          echo "backend_id=${BACKEND_ID}" >> "$GITHUB_OUTPUT"
          echo "worker_id=${WORKER_ID}" >> "$GITHUB_OUTPUT"

      - name: Deploy backend Container App
        env:
          BACKEND_ENV_VARS: >-
            PORT=8000
            ENVIRONMENT=prod
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-prod.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-prod.outputs.event_grid_topic_name }}
            WEB_PUBSUB_ENDPOINT=${{ needs.deploy-infra-prod.outputs.web_pubsub_endpoint }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-prod.outputs.backend_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-prod.outputs.appinsights_connection_string }}
            ENTRA_CIAM_TENANT_SUBDOMAIN=${{ secrets.ENTRA_CIAM_TENANT_SUBDOMAIN || vars.ENTRA_CIAM_TENANT_SUBDOMAIN }}
            ENTRA_CIAM_CLIENT_ID=${{ secrets.ENTRA_CIAM_CLIENT_ID || vars.ENTRA_CIAM_CLIENT_ID }}
            CORS_ALLOWED_ORIGINS=https://${{ needs.deploy-infra-prod.outputs.frontend_custom_domain }}
        run: |
          chmod +x infra/scripts/deploy-container-app.sh
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-backend" \
            --resource-group "${{ needs.deploy-infra-prod.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-prod.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-prod.outputs.acr_login_server }}/integrisight-backend:${{ needs.promote-containers-prod.outputs.image_tag }}" \
            --target-port 8000 \
            --identity "${{ steps.identities.outputs.backend_id }}" \
            --registry-server "${{ needs.deploy-infra-prod.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 10 \
            --env-vars "${BACKEND_ENV_VARS}"

      - name: Configure backend CORS policy
        run: |
          az containerapp ingress cors enable \
            --name "ca-backend" \
            --resource-group "${{ needs.deploy-infra-prod.outputs.resource_group }}" \
            --allowed-origins "https://${{ needs.deploy-infra-prod.outputs.frontend_custom_domain }}" \
            --allowed-methods "GET" "POST" "PUT" "PATCH" "DELETE" "OPTIONS" \
            --allowed-headers "Content-Type" "Authorization" "X-Request-ID" \
            --allow-credentials true

      - name: Deploy frontend Container App
        env:
          FRONTEND_ENV_VARS: >-
            PORT=3000
            API_BASE_URL=https://${{ needs.deploy-infra-prod.outputs.backend_custom_domain }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL || vars.NEXTAUTH_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            ENTRA_CIAM_TENANT_SUBDOMAIN=${{ secrets.ENTRA_CIAM_TENANT_SUBDOMAIN || vars.ENTRA_CIAM_TENANT_SUBDOMAIN }}
            ENTRA_CIAM_FRONTEND_CLIENT_ID=${{ secrets.ENTRA_CIAM_FRONTEND_CLIENT_ID || vars.ENTRA_CIAM_FRONTEND_CLIENT_ID }}
            ENTRA_CIAM_FRONTEND_CLIENT_SECRET=${{ secrets.ENTRA_CIAM_FRONTEND_CLIENT_SECRET }}
            ENTRA_CIAM_CLIENT_ID=${{ secrets.ENTRA_CIAM_CLIENT_ID || vars.ENTRA_CIAM_CLIENT_ID }}
            CLARITY_PROJECT_ID=${{ vars.CLARITY_PROJECT_ID }}
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-frontend" \
            --resource-group "${{ needs.deploy-infra-prod.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-prod.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-prod.outputs.acr_login_server }}/integrisight-frontend:${{ needs.promote-containers-prod.outputs.image_tag }}" \
            --target-port 3000 \
            --identity "${{ steps.identities.outputs.frontend_id }}" \
            --registry-server "${{ needs.deploy-infra-prod.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 10 \
            --env-vars "${FRONTEND_ENV_VARS}"

      - name: Deploy worker-scan-gate Container App
        env:
          WORKER_SCAN_GATE_ENV_VARS: >-
            ENVIRONMENT=prod
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-prod.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-prod.outputs.event_grid_topic_name }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-prod.outputs.worker_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-prod.outputs.appinsights_connection_string }}
            WORKER_MODULE=workers.scan_gate.main
        # min-replicas=1: CPU scaler cannot activate from 0 replicas (no CPU to
        # measure). A native KEDA scaler for Event Grid Namespace pull delivery
        # does not exist yet; switch to min=0 if one ships.
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-worker-scan-gate" \
            --resource-group "${{ needs.deploy-infra-prod.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-prod.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-prod.outputs.acr_login_server }}/integrisight-worker-scan-gate:${{ needs.promote-containers-prod.outputs.image_tag }}" \
            --no-ingress \
            --identity "${{ steps.identities.outputs.worker_id }}" \
            --registry-server "${{ needs.deploy-infra-prod.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 5 \
            --scale-rule-name cpu-scaling \
            --scale-rule-type cpu \
            --scale-rule-metadata "type=Utilization value=70" \
            --env-vars "${WORKER_SCAN_GATE_ENV_VARS}"

      - name: Deploy worker-parser Container App
        env:
          WORKER_PARSER_ENV_VARS: >-
            ENVIRONMENT=prod
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-prod.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-prod.outputs.event_grid_topic_name }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-prod.outputs.worker_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-prod.outputs.appinsights_connection_string }}
            WORKER_MODULE=workers.parser.main
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-worker-parser" \
            --resource-group "${{ needs.deploy-infra-prod.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-prod.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-prod.outputs.acr_login_server }}/integrisight-worker-parser:${{ needs.promote-containers-prod.outputs.image_tag }}" \
            --no-ingress \
            --identity "${{ steps.identities.outputs.worker_id }}" \
            --registry-server "${{ needs.deploy-infra-prod.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 5 \
            --scale-rule-name cpu-scaling \
            --scale-rule-type cpu \
            --scale-rule-metadata "type=Utilization value=70" \
            --env-vars "${WORKER_PARSER_ENV_VARS}"

      - name: Deploy worker-graph-builder Container App
        env:
          WORKER_GRAPH_BUILDER_ENV_VARS: >-
            ENVIRONMENT=prod
            COSMOS_DB_ENDPOINT=${{ needs.deploy-infra-prod.outputs.cosmos_db_endpoint }}
            BLOB_STORAGE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.blob_storage_endpoint }}
            EVENT_GRID_NAMESPACE_ENDPOINT=${{ needs.deploy-infra-prod.outputs.event_grid_endpoint }}
            EVENT_GRID_TOPIC=${{ needs.deploy-infra-prod.outputs.event_grid_topic_name }}
            AZURE_CLIENT_ID=${{ needs.deploy-infra-prod.outputs.worker_identity_client_id }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=${{ needs.deploy-infra-prod.outputs.appinsights_connection_string }}
            WORKER_MODULE=workers.graph_builder.main
        run: |
          ./infra/scripts/deploy-container-app.sh \
            --name "ca-worker-graph-builder" \
            --resource-group "${{ needs.deploy-infra-prod.outputs.resource_group }}" \
            --environment "${{ needs.deploy-infra-prod.outputs.cae_name }}" \
            --image "${{ needs.deploy-infra-prod.outputs.acr_login_server }}/integrisight-worker-graph-builder:${{ needs.promote-containers-prod.outputs.image_tag }}" \
            --no-ingress \
            --identity "${{ steps.identities.outputs.worker_id }}" \
            --registry-server "${{ needs.deploy-infra-prod.outputs.acr_login_server }}" \
            --cpu 0.25 \
            --memory 0.5Gi \
            --min-replicas 1 \
            --max-replicas 5 \
            --scale-rule-name cpu-scaling \
            --scale-rule-type cpu \
            --scale-rule-metadata "type=Utilization value=70" \
            --env-vars "${WORKER_GRAPH_BUILDER_ENV_VARS}"

  # ---------------------------------------------------------------------------
  # Prod — Deploy Azure Front Door (after Container Apps exist)
  # ---------------------------------------------------------------------------
  deploy-afd-prod:
    name: "Prod — Deploy Azure Front Door"
    needs: [deploy-infra-prod, deploy-apps-prod]
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Front Door
        id: deploy-afd
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-prod.outputs.resource_group }}
        run: |
          DEPLOYMENT_OUTPUT=$(az deployment group create \
            --name "aic-prod-afd-${{ github.run_number }}" \
            --resource-group "${RESOURCE_GROUP}" \
            --parameters infra/bicep/environments/prod-afd.bicepparam \
            --query 'properties.outputs' \
            --output json)

          echo "profile_name=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorProfileName.value')" >> "$GITHUB_OUTPUT"
          echo "frontend_endpoint=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorFrontendEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "backend_endpoint=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorBackendEndpoint.value')" >> "$GITHUB_OUTPUT"
          echo "pubsub_endpoint=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.frontDoorPubsubEndpoint.value')" >> "$GITHUB_OUTPUT"

      - name: Display AFD endpoints and DNS validation info
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-prod.outputs.resource_group }}
          PROFILE_NAME: ${{ steps.deploy-afd.outputs.profile_name }}
          FRONTEND_ENDPOINT: ${{ steps.deploy-afd.outputs.frontend_endpoint }}
          BACKEND_ENDPOINT: ${{ steps.deploy-afd.outputs.backend_endpoint }}
          PUBSUB_ENDPOINT: ${{ steps.deploy-afd.outputs.pubsub_endpoint }}
        run: |
          echo "========================================"
          echo " Azure Front Door Deployment Complete"
          echo "========================================"
          echo ""
          echo "AFD Endpoints:"
          echo "  Frontend : ${FRONTEND_ENDPOINT}"
          echo "  Backend  : ${BACKEND_ENDPOINT}"
          echo "  PubSub   : ${PUBSUB_ENDPOINT}"
          echo ""
          echo "DNS Validation Information:"
          echo "----------------------------------------"

          DOMAINS=("cd-frontend" "cd-backend" "cd-pubsub")
          ENDPOINTS=("${FRONTEND_ENDPOINT}" "${BACKEND_ENDPOINT}" "${PUBSUB_ENDPOINT}")

          for i in "${!DOMAINS[@]}"; do
            DOMAIN_NAME="${DOMAINS[$i]}"
            CNAME_TARGET="${ENDPOINTS[$i]}"

            DOMAIN_INFO=$(az afd custom-domain show \
              --profile-name "${PROFILE_NAME}" \
              --resource-group "${RESOURCE_GROUP}" \
              --custom-domain-name "${DOMAIN_NAME}" \
              --query '{hostname: hostName, validationToken: validationProperties.validationToken}' \
              --output json)

            HOSTNAME=$(echo "$DOMAIN_INFO" | jq -r '.hostname')
            TOKEN=$(echo "$DOMAIN_INFO" | jq -r '.validationToken // "N/A"')

            echo ""
            echo "  Domain       : ${HOSTNAME}"
            echo "  TXT Record   : _dnsauth.${HOSTNAME}"
            echo "  TXT Token    : ${TOKEN}"
            echo "  CNAME Record : ${HOSTNAME} → ${CNAME_TARGET}"
          done

          echo ""
          echo "========================================"

      - name: Configure Cloudflare DNS records
        env:
          RESOURCE_GROUP: ${{ needs.deploy-infra-prod.outputs.resource_group }}
          PROFILE_NAME: ${{ steps.deploy-afd.outputs.profile_name }}
          FRONTEND_ENDPOINT: ${{ steps.deploy-afd.outputs.frontend_endpoint }}
          BACKEND_ENDPOINT: ${{ steps.deploy-afd.outputs.backend_endpoint }}
          PUBSUB_ENDPOINT: ${{ steps.deploy-afd.outputs.pubsub_endpoint }}
          CLOUDFLARE_DNS_ZONE_ID: ${{ vars.CLOUDFLARE_DNS_ZONE_ID }}
          CLOUDFLARE_DNS_API_KEY: ${{ secrets.CLOUDFLARE_DNS_API_KEY }}
          CLOUDFLARE_DEBUG: ${{ vars.CLOUDFLARE_DEBUG }}
        run: |
          chmod +x infra/scripts/configure-cloudflare-dns.sh
          DEBUG_FLAG=""
          if [[ "${CLOUDFLARE_DEBUG}" == "true" ]]; then
            DEBUG_FLAG="--debug"
          fi
          ./infra/scripts/configure-cloudflare-dns.sh \
            --profile-name "${PROFILE_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --cloudflare-zone-id "${CLOUDFLARE_DNS_ZONE_ID}" \
            --cloudflare-api-key "${CLOUDFLARE_DNS_API_KEY}" \
            --domains "cd-frontend,cd-backend,cd-pubsub" \
            --endpoints "${FRONTEND_ENDPOINT},${BACKEND_ENDPOINT},${PUBSUB_ENDPOINT}" \
            ${DEBUG_FLAG}

  # ---------------------------------------------------------------------------
  # Prod — Restore Resource Lock (always runs after deployment completes)
  # ---------------------------------------------------------------------------
  restore-lock-prod:
    name: "Prod — Restore Resource Lock"
    needs: [deploy-infra-prod, deploy-afd-prod]
    if: ${{ always() && needs.deploy-infra-prod.result != 'skipped' }}
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Add resource lock
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          az lock create \
            --name "${LOCK_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --lock-type CanNotDelete \
            --notes "Prevents accidental deletion of resources. Managed by CI/CD pipeline."