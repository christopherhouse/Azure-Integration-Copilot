# =============================================================================
# CodeQL Security Analysis — Integrisight.ai
# =============================================================================
# Runs GitHub CodeQL SAST on Python (backend) and JavaScript/TypeScript
# (frontend). Scheduled weekly and on every push/PR to main.
# =============================================================================

name: "CodeQL Security Analysis"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: "CodeQL — ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
        include:
          - language: python
            source-root: src/backend
          - language: javascript-typescript
            source-root: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          source-root: ${{ matrix.source-root }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
